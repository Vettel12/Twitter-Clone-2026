stages:
  - lint
  - test

variables:
  POSTGRES_DB: twitter_clone_db_test
  POSTGRES_USER: skillbox
  POSTGRES_PASSWORD: skillbox_password
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  SECRET_KEY: test_secret_key_for_ci

# Кэш ускоряет повторные запуски (сохраняется между джобами и пайплайнами)
cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .cache/pip
    - twitter-clone-2026/.mypy_cache
  policy: pull-push

linting:
  stage: lint
  image: python:3.13
  timeout: 15m  # Явный лимит, чтобы пайплайн не висел без логов
  retry: 1      # На случай сетевых проблем при pip install
  before_script:
    - cd twitter-clone-2026
    - pip install --cache-dir .cache/pip -e .[dev]
  script:
    - ruff check .
    - ruff format --check .
    # mypy без проверки сторонних библиотек + кэш (ускоряет в 3-5 раз)
    - mypy --cache-dir .mypy_cache --ignore-missing-imports .

tests:
  stage: test
  image: python:3.13
  timeout: 20m
  services:
    - name: postgres:16-alpine
      alias: postgres
  
  before_script:
    - cd twitter-clone-2026
    - pip install --cache-dir .cache/pip -e .[dev]
    - |
      cat <<EOF > .env
      POSTGRES_DB=$POSTGRES_DB
      POSTGRES_USER=$POSTGRES_USER
      POSTGRES_PASSWORD=$POSTGRES_PASSWORD
      POSTGRES_HOST=$POSTGRES_HOST
      POSTGRES_PORT=$POSTGRES_PORT
      SECRET_KEY=$SECRET_KEY
      EOF
    # Ждём готовности PostgreSQL (простой и надёжный способ без apt)
    - until python -c "import socket; s=socket.socket(); s.settimeout(2); s.connect(('postgres', 5432)); s.close()" 2>/dev/null; do echo "⏳ Waiting for PostgreSQL..."; sleep 2; done

  script:
    - pytest -v --cov=. --cov-report=term-missing
    