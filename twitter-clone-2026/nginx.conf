server {
    listen 80;
    server_name localhost;

    # 1. SPA Frontend (Vue/React) — должен быть ПЕРВЫМ, но после API-правил
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Медиа-файлы
    location /media/ {
        alias /usr/share/nginx/html/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # =====================================================
    # === API PROXY — СПЕЦИФИЧНЫЕ ПУТИ ПЕРЕД ОБЩИМИ ===
    # =====================================================

    # Swagger UI: /api/docs → backend:/api/docs
    location = /api/docs {
        proxy_pass http://backend-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenAPI schema: /api/openapi.json → backend:/api/openapi.json
    location = /api/openapi.json {
        proxy_pass http://backend-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Content-Type "application/json";
        add_header Access-Control-Allow-Origin "*";
    }

    # OAuth2 redirect для Swagger
    location /api/docs/oauth2-redirect {
        proxy_pass http://backend-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ReDoc (если включён)
    location = /api/redoc {
        proxy_pass http://backend-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === ОБЩИЙ БЛОК /api — ДОЛЖЕН БЫТЬ ПОСЛЕДНИМ ===
    location /api {
        proxy_pass http://backend-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =====================================================
    # === БЛОКИРОВКА ЛИШНИХ ПУТЕЙ (опционально) ===
    # =====================================================
    
    # Если кто-то запросит /docs (без /api) — вернём 404 или редирект
    location = /docs {
        return 404;
        # Или редирект: return 301 /api/docs;
    }
