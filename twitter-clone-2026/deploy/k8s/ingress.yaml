apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: twitter-ingress
  namespace: twitter-clone
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: "twitter.local" # Можно заменить на реальный домен или IP
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
