# Пример файла Secrets для Kubernetes.
# НЕ используйте эти значения в production!
# Создайте свой файл 02-secrets.yaml с реальными base64-значениями.
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: twitter-clone
type: Opaque
stringData:
  POSTGRES_USER: "<your_db_user>"
  POSTGRES_PASSWORD: "<your_strong_password>"
  SECRET_KEY: "<generate_with_python_secrets>"
