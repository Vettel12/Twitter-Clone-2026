apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: twitter-ingress
  namespace: twitter-clone
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - http:
      paths:
      # 1. API запросы -> Backend (путь передается как есть)
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
      # 2. Swagger UI (/docs) -> Backend
      - path: /docs
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
      # 3. OpenAPI schema -> Backend
      - path: /openapi.json
        pathType: Exact
        backend:
          service:
            name: backend-service
            port:
              number: 8000
      # 4. Остальное -> Frontend
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
