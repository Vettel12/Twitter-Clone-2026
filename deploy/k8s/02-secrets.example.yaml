# ==============================================================================
# Kubernetes Secrets — ШАБЛОН (для тестирования и разработки)
# ==============================================================================
# Этот файл содержит СЕКРЕТЫ в открытом виде (stringData).
# Kubernetes автоматически закодирует их в base64.
#
# ⚠️ ВНИМАНИЕ: НЕ используйте этот файл в production!
# Для production:
#   1. Используйте внешние секрет-менеджеры (HashiCorp Vault, AWS Secrets Manager)
#   2. Или закодируйте значения вручную: echo -n "value" | base64
#   3. Включите Encryption at Rest в вашем кластере
#
# 📋 Инструкция по использованию:
#   1. Скопируйте файл: cp deploy/k8s/02-secrets.example.yaml deploy/k8s/02-secrets.yaml
#   2. При необходимости измените значения в 02-secrets.yaml
#   3. Примените: kubectl apply -f deploy/k8s/02-secrets.yaml
#   4. НЕ коммитьте 02-secrets.yaml в репозиторий! (он в .gitignore)
# ==============================================================================
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: twitter-clone
type: Opaque
stringData:
  # Пользователь базы данных (обычный пользователь, НЕ superuser)
  POSTGRES_USER: "skillbox"

  # Пароль базы данных (для тестирования — простой, для production — сложный!)
  POSTGRES_PASSWORD: "skillbox_2026"

  # Секретный ключ для подписи токенов и сессий
  # Генерация: python -c "import secrets; print(secrets.token_urlsafe(32))"
  SECRET_KEY: "super_secret_key_2026_do_not_share"
